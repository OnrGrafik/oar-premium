<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OAR Premium — Multi-Agent Quant OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:#07090a;color:#cdd9d8;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#1c2625;border-radius:5px}
::-webkit-scrollbar-track{background:#0a0d0e}
@keyframes oarblink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes oarticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes oarfeedin{0%{opacity:0;transform:translateY(-7px)}100%{opacity:1;transform:translateY(0)}}
@keyframes oarpulse{0%,100%{opacity:.5}50%{opacity:1}}
.info-tip{position:relative}
.info-tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#131918;border:1px solid #1c302a;color:#b8c6c3;font-size:10px;line-height:1.45;padding:7px 10px;border-radius:6px;white-space:pre-wrap;width:220px;z-index:999;pointer-events:none;opacity:0;transition:opacity .15s}
.info-tip:hover::after{opacity:1}
.sg{font-family:'Space Grotesk',sans-serif}
.navbtn{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:7px;border:1px solid transparent;background:none;color:#8a9c99;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;width:100%;transition:.15s}
.navbtn:hover{filter:brightness(1.3)}
.navbtn.active{background:#10171680;border-color:#1c302a;color:#eaf4f2}
.card{background:#0c1112;border:1px solid #18211f;border-radius:9px}
input,button{font-family:'JetBrains Mono',monospace}
a{color:inherit;text-decoration:none}
/* ═══ OPSİYON MASASI (Options Desk teması — yalnız .od kapsamı) ═══ */
.od{
  --od-bg:#07090a;--od-surface:#0c1112;--od-surface-2:#131918;
  --od-line:#18211f;--od-line-soft:#131918;--od-line-strong:#1a2422;
  --od-text:#cdd9d8;--od-text-2:#b8c6c3;--od-dim:#8a9c99;--od-mute:#5e716f;
  --od-accent:#1ff0ad;--od-pos:#1ff0ad;--od-neg:#ff5d6c;--od-neutral:#9fb0ad;
  --od-serif:'Space Grotesk',sans-serif;
  --od-sans:'JetBrains Mono',ui-monospace,monospace;
  --od-mono:'JetBrains Mono',ui-monospace,monospace;
  margin:-18px -20px -28px;padding:26px 34px 40px;
  background:var(--od-bg);color:var(--od-text);
  font-family:var(--od-sans);font-size:13px;min-height:calc(100vh - 46px);
}
.od *{box-sizing:border-box}
.od .pos{color:var(--od-pos)!important}.od .neg{color:var(--od-neg)!important}

.od-top{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:24px}
.od-title{font-family:var(--od-serif);font-size:30px;font-weight:400;letter-spacing:-.01em;color:var(--od-text);line-height:1}
.od-sub{font-size:11px;color:var(--od-dim)}
.od-vade{margin-left:auto;display:flex;gap:5px}
.od-chip{padding:4px 11px;background:var(--od-surface-2);border:1px solid var(--od-line);color:var(--od-dim);font-family:var(--od-sans);font-size:11px;font-weight:500;cursor:pointer;letter-spacing:.03em;transition:.15s}
.od-chip:hover{color:var(--od-text);border-color:var(--od-line-strong)}
.od-chip.on{background:var(--od-accent);border-color:var(--od-accent);color:#07090a;font-weight:700}

.od-sec{padding:30px 0 4px;border-top:1px solid var(--od-line);margin-top:24px}
.od-sec:first-of-type{border-top:none;margin-top:0;padding-top:4px}
.od-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;padding-bottom:12px;border-bottom:1px solid var(--od-line-soft)}
.od-h2{font-family:var(--od-serif);font-size:21px;font-weight:400;line-height:1;color:var(--od-text);letter-spacing:-.01em;margin:0}
.od-nbr{font-family:var(--od-serif);color:var(--od-accent);font-style:italic;margin-right:10px}
.od-meta{font-size:10px;font-weight:600;color:var(--od-dim);letter-spacing:.08em;text-transform:uppercase}

.od-pull{font-family:var(--od-serif);font-size:23px;line-height:1.35;color:var(--od-text-2);max-width:62ch;margin:0}
.od-pull em{font-style:italic;color:var(--od-accent)}

.od-wrap{display:grid;grid-template-columns:1.75fr 1fr;gap:38px}
.od-two{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.od-walls{display:grid;grid-template-columns:1fr 280px;gap:34px}
@media(max-width:1100px){.od-wrap,.od-two,.od-walls{grid-template-columns:1fr}}

.od-ladder{display:flex;flex-direction:column;font-family:var(--od-sans);font-size:12px;width:100%}
.od-lhead,.od-lrow{display:grid;grid-template-columns:40px 50px 1fr 84px 1fr 70px 58px;align-items:center}
.od-lhead{padding:7px 0;border-bottom:1px solid var(--od-line);color:var(--od-mute);font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
.od-lhead>div:nth-child(3){text-align:right;padding-right:13px}
.od-lhead>div:nth-child(5){text-align:left;padding-left:13px}
.od-lrow{padding:5px 0;border-bottom:1px solid var(--od-line-soft);color:var(--od-text-2);cursor:crosshair;transition:background .1s}
.od-lrow:hover{background:var(--od-surface-2)}
.od-lrow.spot{background:rgba(196,165,116,.08);border-top:1px solid var(--od-accent);border-bottom:1px solid var(--od-accent);color:var(--od-text)}
.od-tag{font-size:10px;font-weight:700;color:var(--od-mute);text-align:center;letter-spacing:.05em}
.od-tag.cw{color:var(--od-pos)}.od-tag.pw{color:var(--od-neg)}.od-tag.mp{color:var(--od-accent)}.od-tag.zg{color:var(--od-neutral)}
.od-ap{font-size:11px;font-weight:700;color:var(--od-dim);text-align:center}
.od-bar{height:16px;display:flex;align-items:center}
.od-bar.put{justify-content:flex-end;padding-right:13px}
.od-bar.call{justify-content:flex-start;padding-left:13px}
.od-fill{height:9px;border-radius:1px;opacity:.85}
.od-fill.call{background:var(--od-pos)}.od-fill.put{background:var(--od-neg)}
.od-strike{font-size:13px;font-weight:700;color:var(--od-text);text-align:right;padding-right:15px;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.od-lrow.spot .od-strike{color:var(--od-accent)}
.od-net{font-size:11px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums}
.od-dist{font-size:10px;font-weight:500;color:var(--od-dim);text-align:right;font-variant-numeric:tabular-nums}
.od-dist.pos{color:#6f9a7e}.od-dist.neg{color:#a86a60}

.od-sheet-label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--od-mute);margin-bottom:10px}
.od-lvl{display:grid;grid-template-columns:10px 1fr auto auto;gap:12px;align-items:baseline;padding:11px 0;border-bottom:1px solid var(--od-line-soft)}
.od-lvl:last-child{border-bottom:none}
.od-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.od-lname{font-size:12px;font-weight:500;color:var(--od-text)}
.od-lsub{font-size:10px;color:var(--od-mute);margin-left:5px}
.od-lval{font-size:13px;font-weight:700;color:var(--od-text);font-family:var(--od-mono)}
.od-ldelta{font-size:11px;font-weight:700;color:var(--od-dim);min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
.od-ldelta.pos{color:var(--od-pos)}.od-ldelta.neg{color:var(--od-neg)}

.od-greeks{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:20px 0}
.od-greek{padding:22px 30px 22px 0;border-right:1px solid var(--od-line)}
.od-greek:last-child{border-right:none;padding-right:0}
.od-glyph{font-family:var(--od-serif);font-style:italic;font-size:24px;color:var(--od-accent);margin-bottom:6px;line-height:1}
.od-glabel{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--od-mute);margin-bottom:12px}
.od-gnum{font-family:var(--od-serif);font-size:36px;line-height:1;color:var(--od-text);margin-bottom:8px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.od-gfoot{font-size:10px;font-weight:600;color:var(--od-dim);line-height:1.55}

.od-empty{color:var(--od-mute);font-size:11px;padding:26px;text-align:center}
.od-note{font-size:10px;color:var(--od-dim);line-height:1.6;margin-top:8px;background:var(--od-surface);border:1px solid var(--od-line);padding:10px 14px}
.od-cvd-h{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.od-cvd-t{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--od-mute);text-transform:uppercase}
.od-pill{padding:2px 10px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.06em;color:#fff}
.od-flow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
.od-flow-c{background:var(--od-surface);border:1px solid var(--od-line);padding:10px 12px;display:flex;justify-content:space-between;align-items:baseline}
.od-flow-l{font-size:10px;color:var(--od-mute)}
.od-flow-v{font-family:var(--od-serif);font-size:16px;color:var(--od-text)}
.od-scn{display:grid;grid-template-columns:1fr auto;gap:16px;padding:11px 0;border-bottom:1px solid var(--od-line-soft)}
.od-foot{display:flex;justify-content:space-between;align-items:flex-end;padding:14px 0 0;border-top:1px solid var(--od-line);margin-top:26px;font-size:10px;color:var(--od-mute)}
.od-foot-pg{font-family:var(--od-serif);font-style:italic;color:var(--od-accent);font-size:16px}
</style>
</head>
<body>
<div style="display:flex;height:100vh;width:100vw;overflow:hidden;background:#07090a">

  <!-- SIDEBAR -->
  <aside style="width:230px;flex-shrink:0;background:#090c0d;border-right:1px solid #161e1d;display:flex;flex-direction:column">
    <div style="padding:17px 17px 15px;border-bottom:1px solid #141b1a;display:flex;align-items:center;gap:11px">
      <div class="sg" style="width:31px;height:31px;border-radius:8px;background:linear-gradient(140deg,#1ff0ad,#0a8f66);display:flex;align-items:center;justify-content:center;font-weight:700;color:#04130d;font-size:15px;box-shadow:0 0 16px rgba(21,224,160,.25)">◆</div>
      <div>
        <div class="sg" style="font-weight:700;font-size:15px;letter-spacing:.03em;color:#eaf4f2;line-height:1">OAR<span style="color:#1ff0ad"> PREMIUM</span></div>
        <div style="font-size:8.5px;letter-spacing:.16em;color:#4a5b59;margin-top:5px">MULTI-AGENT QUANT OS</div>
      </div>
    </div>
    <nav id="nav" style="padding:11px 9px;display:flex;flex-direction:column;gap:3px"></nav>
    <div style="margin-top:auto;padding:12px 13px 13px;border-top:1px solid #141b1a">
      <div style="margin-top:0;display:flex;align-items:center;gap:7px;font-size:9.5px;color:#5e716f">
        <span style="width:6px;height:6px;border-radius:50%;background:#56a8ff"></span>
        <span>Gemini 2.5 → Groq fallback</span>
      </div>
    </div>
  </aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <!-- HEADER TICKER -->
    <header style="height:46px;flex-shrink:0;border-bottom:1px solid #161e1d;background:#090c0d;display:flex;align-items:center;overflow:hidden">
      <div style="flex:1;overflow:hidden;height:100%;position:relative;-webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent)">
        <div id="ticker" style="display:flex;width:max-content;animation:oarticker 55s linear infinite"></div>
      </div>
      <div style="display:flex;align-items:center;gap:15px;padding:0 18px;border-left:1px solid #161e1d;height:100%;flex-shrink:0">
        <span style="font-size:10.5px;color:#6f8180">F&amp;G <span id="fng" style="color:#ffb13c;font-weight:600">—</span></span>
        <span style="font-size:11px;color:#6f8180">TR <span id="clock" style="color:#cdd9d8">—</span></span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#1ff0ad"><span style="width:7px;height:7px;border-radius:50%;background:#1ff0ad;animation:oarblink 1.6s infinite"></span>CANLI</span>
      </div>
    </header>

    <main id="screen" style="flex:1;overflow-y:auto;padding:18px 20px 28px"></main>
  </div>
</div>

<script>
// ════════════ STATE ════════════
const ST = {tab:'leader', clock:'', chat:[], feed:[], signals:[], report:{}, ctx:{}, theories:[], selTheory:null, kbQuery:''};
const API = '';

const NAV = [
  {id:'leader',  icon:'◆', label:'Komuta Merkezi'},
  {id:'options', icon:'∑', label:'Opsiyon & GEX'},
  {id:'macro',   icon:'▦', label:'Makro Ekonomi'},
  {id:'live',    icon:'◈', label:'Canlı Panel'},
  {id:'knowledge',icon:'⛁', label:'Bilgi / Hafıza'},
];

const BOTS = [
  {name:'OAR Kombo',    tf:'5m',  dot:'#f43f5e', tip:'sinyal'},
  {name:'OAR Pattern',  tf:'15m', dot:'#1ff0ad', tip:'sinyal'},
  {name:'UTBot',        tf:'5m',  dot:'#1ff0ad', tip:'sinyal'},
  {name:'MA Scanner',   tf:'1d',  dot:'#ffb13c', tip:'sinyal'},
  {name:'CVD Scanner',  tf:'10m', dot:'#8b5cf6', tip:'sinyal'},
  {name:'Asia Ekstrem', tf:'15m', dot:'#56a8ff', tip:'sinyal'},
  {name:'Volume Bot',   tf:'1h',  dot:'#ec4899', tip:'sinyal'},
  {name:'Balina Bot',   tf:'tick',dot:'#06b6d4', tip:'bilgi'},
  {name:'Korelasyon',   tf:'1d',  dot:'#84cc16', tip:'bilgi'},
  {name:'Whale Tracker',tf:'tick',dot:'#f97316', tip:'bilgi'},
  {name:'Makro Alarm',  tf:'4h',  dot:'#a855f7', tip:'bilgi'},
];

// ════════════ HELPERS ════════════
const $ = id => document.getElementById(id);
async function jget(u){try{const r=await fetch(API+u);return await r.json();}catch(e){return null;}}
async function jpost(u,b){try{const r=await fetch(API+u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});return await r.json();}catch(e){return null;}}
function esc(s){return (s||'').replace(/</g,'&lt;');}
function fmtNum(n){return Number(n).toLocaleString('en-US');}

// Sparkline SVG
function spark(vals,color,w,hh){
  vals=(vals||[]).map(Number).filter(v=>isFinite(v));
  if(vals.length<2)return '<div style="height:'+(hh||40)+'px;display:flex;align-items:center;justify-content:center;color:#5e716f;font-size:9px">yeterli veri yok</div>';
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>[(i/(vals.length-1))*w,hh-2-((v-min)/rng)*(hh-4)]);
  const line='M'+pts.map(p=>(isFinite(p[0])?p[0]:0).toFixed(1)+' '+(isFinite(p[1])?p[1]:hh/2).toFixed(1)).join(' L ');
  const id='sp'+Math.round(Math.random()*1e6);
  return `<svg width="100%" height="${hh}" viewBox="0 0 ${w} ${hh}" preserveAspectRatio="none" style="display:block">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${line} L ${w} ${hh} L 0 ${hh} Z" fill="url(#${id})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// ════════════ NAV + RAIL ════════════
function renderNav(){
  $('nav').innerHTML = NAV.map(n=>`
    <button class="navbtn ${ST.tab===n.id?'active':''}" onclick="go('${n.id}')">
      <span style="width:17px;display:flex;justify-content:center;flex-shrink:0">${n.icon}</span>
      <span style="flex:1;text-align:left">${n.label}</span>
    </button>`).join('');
}
function go(tab){ST.tab=tab;renderNav();render();if(tab==='knowledge')loadKnowledge();if(tab==='options')loadOptionsFull();if(tab==='macro'&&!ST.makro)loadMakro();if(tab==='live'&&!ST.theoryHipotez)loadTheoryHipotez();}

// ════════════ TICKER ════════════
async function loadTicker(){
  const d = await jget('/api/ticker');
  let items = [];
  if(d && d.items){
    items = d.items.map(c=>({sym:c.sym,
      price: c.sym==='Altın'||c.sym==='Gümüş'||c.sym==='VIX'?('$'+fmtNum(c.price)):(c.price>100?('$'+fmtNum(Math.round(c.price))):('$'+c.price)),
      chg:(c.chg>=0?'+':'')+c.chg+'%',
      col:c.chg>=0?'#1ff0ad':'#ff5d6c'}));
  }
  if(!items.length)items=[{sym:'BTC',price:'—',chg:'',col:'#9fb0ad'}];
  const html = items.map(t=>`<span style="display:inline-flex;align-items:center;gap:7px;padding:0 15px;border-right:1px solid #131918;height:46px">
    <span style="color:#9fb0ad;font-weight:600">${t.sym}</span><span style="color:#cdd9d8">${t.price}</span><span style="color:${t.col};font-size:11px">${t.chg}</span></span>`).join('');
  $('ticker').innerHTML = html+html;
}

function tickClock(){
  const now=new Date();
  const tr=new Date(now.toLocaleString('en-US',{timeZone:'Europe/Istanbul'}));
  ST.clock=tr.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if($('clock'))$('clock').textContent=ST.clock;
}

// ════════════ SCREENS ════════════
function render(){
  const m=$('screen');
  if(ST.tab==='leader'){m.innerHTML=scrLeader();}
  else if(ST.tab==='options')m.innerHTML=scrOptions();
  else if(ST.tab==='knowledge')m.innerHTML=scrKnowledge();
  else if(ST.tab==='live')m.innerHTML=scrLive();
  else if(ST.tab==='macro')m.innerHTML=scrMacro();
}

// ─── KOMUTA MERKEZİ: GRAFİK + SKOR PANELİ ───
// ─── KOMUTA MERKEZİ (v3) ───
let _kcoin='BTCUSDT';  // grafik kaldırıldı; _kcoin yalnız grafik-yorum endpoint'i için

function scrLeader(){
  const pd=ST.piyasaDurumu||{}, pv=pd.veri||{};
  const oy=ST.opsiyonYorum||{}, ov=oy.veri||{};
  const ind=ST.indicators||{}, sk=ind.skor||{};
  const skor=sk.skor!=null?sk.skor:'—', skRenk=sk.renk||'#9fb0ad';
  const detay=(sk.detay||[]).slice(0,6);

  const detayHtml=detay.length?detay.map(d=>`
    <div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:10px">
      <span style="width:90px;flex-shrink:0;color:#8a9c99;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.ind}</span>
      <div style="flex:1;height:5px;border-radius:3px;background:#141d1b;position:relative;overflow:hidden">
        <div style="position:absolute;left:50%;top:0;height:100%;width:${Math.min(Math.abs(d.katki)*2,50)}%;${d.katki>=0?'background:#1ff0ad':'background:#ff5d6c;transform:translateX(-100%)'}"></div>
      </div>
      <span style="width:34px;text-align:right;color:${d.katki>=0?'#1ff0ad':'#ff5d6c'}">${d.katki>=0?'+':''}${d.katki}</span>
    </div>`).join(''):'<div style="font-size:10px;color:#5e716f">İndikatör verisi yükleniyor...</div>';

  const bol=pd.bolumler||{};
  const gy=ST.grafikYorum||{};
  const vurgu=(t)=>esc(t||'').replace(/\*\*(.+?)\*\*/g,'<b style="color:#7af0c4">$1</b>');
  const has3=bol.teknik||bol.temel||bol.psikoloji;
  const rejim=pv.rejim||'—';
  const regColor=rejim==='TREND'?'#1ff0ad':rejim==='RANGE'?'#ffb13c':rejim==='EXPANSION'?'#56a8ff':rejim==='REVERSAL'?'#ff5d6c':'#9fb0ad';

  const baslikKutu=(ad,renk,icerik)=>`
    <div style="background:#0a0f0f;border:1px solid #18211f;border-left:2px solid ${renk};border-radius:7px;padding:11px 13px">
      <div class="sg" style="font-size:9px;letter-spacing:.12em;color:${renk};margin-bottom:6px">${ad}</div>
      <div style="font-size:10.5px;color:#b8c6c3;line-height:1.55">${icerik?vurgu(icerik):'<span style="color:#5e716f">yükleniyor...</span>'}</div>
    </div>`;

// OD palet (SVG + body'ye eklenen tooltip CSS değişkeni çözemez → hex)
const OD={bg:'#07090a',surf:'#0c1112',line:'#18211f',lineS:'#131918',lineH:'#1a2422',text:'#cdd9d8',t2:'#b8c6c3',dim:'#8a9c99',mute:'#5e716f',acc:'#1ff0ad',pos:'#1ff0ad',neg:'#ff5d6c',neu:'#9fb0ad',buy:'#56a8ff',sell:'#ff8a3c'};

// Hover tooltip (Options Desk yüzeyi)
function optTip(e,html){
  let t=document.getElementById('opt-tip');
  if(!t){t=document.createElement('div');t.id='opt-tip';
    t.style.cssText='position:fixed;z-index:9999;background:#0c1112;border:1px solid #1a2422;border-radius:4px;padding:9px 12px;font-family:ui-monospace,monospace;font-size:10px;color:#b8c6c3;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.6);max-width:240px;line-height:1.5';
    document.body.appendChild(t);}
  t.innerHTML=html;t.style.display='block';
  t.style.left=Math.min(e.clientX+14,window.innerWidth-260)+'px';
  t.style.top=(e.clientY+14)+'px';
}
function optTipHide(){const t=document.getElementById('opt-tip');if(t)t.style.display='none';}

// kompakt sayı (K/M/Mr)
function odK(n){if(n==null||!isFinite(n))return '—';const x=Number(n),a=Math.abs(x),s=x<0?'-':'';if(a>=1e9)return s+(a/1e9).toFixed(2)+'Mr';if(a>=1e6)return s+(a/1e6).toFixed(1)+'M';if(a>=1e3)return s+(a/1e3).toFixed(0)+'K';return s+a.toFixed(0);}

// ── i. STRİKE TOPOGRAFYASI (merdiven) ──
function odLadder(t,lv,spot){
  const all=(t.strikes||[]);
  if(!all.length||!spot)return '<div class="od-empty">Opsiyon verisi yükleniyor (Deribit)…</div>';
  const lo=spot*0.90,hi=spot*1.10;
  const vis=all.filter(s=>s.strike>=lo&&s.strike<=hi).slice().sort((a,b)=>b.strike-a.strike);
  if(!vis.length)return '<div class="od-empty">Bu vade için strike yok.</div>';
  const maxOI=Math.max(...vis.map(s=>Math.max(s.callOI||0,s.putOI||0)),1);
  const sumOI=vis.reduce((a,s)=>a+(s.callOI||0)+(s.putOI||0),0)||1;
  const tagOf=s=>{if(lv.call_wall===s.strike)return['CW','cw'];if(lv.put_wall===s.strike)return['PW','pw'];if(lv.max_pain===s.strike)return['MP','mp'];if(lv.zero_gamma&&Math.abs(lv.zero_gamma-s.strike)<spot*0.004)return['ZΓ','zg'];return['',''];};
  const spotRow=`<div class="od-lrow spot"><div class="od-tag" style="color:${OD.acc}">◆</div><div></div><div class="od-bar put"></div><div class="od-strike">${fmtNum(Math.round(spot))}</div><div class="od-bar call"></div><div class="od-net" style="color:${OD.acc}">—</div><div class="od-dist" style="color:${OD.acc}">0.00%</div></div>`;
  let rows='',placed=false;
  vis.forEach(s=>{
    if(!placed&&s.strike<spot){rows+=spotRow;placed=true;}
    const tg=tagOf(s),tag=tg[0],cls=tg[1];
    const callW=(s.callOI||0)/maxOI*100,putW=(s.putOI||0)/maxOI*100;
    const oiPct=(((s.callOI||0)+(s.putOI||0))/sumOI*100);
    const dist=(s.strike-spot)/spot*100,ng=s.netGamma||0;
    const tip=`<b style='color:${OD.text}'>$${fmtNum(s.strike)}</b>${cls==='cw'?' · CALL WALL':cls==='pw'?' · PUT WALL':cls==='zg'?' · ZERO GAMMA':cls==='mp'?' · MAX PAIN':''}<br>Call OI: <b style='color:${OD.pos}'>${fmtNum(s.callOI||0)}</b><br>Put OI: <b style='color:${OD.neg}'>${fmtNum(s.putOI||0)}</b><br>Net γ: <b style='color:${ng>=0?OD.pos:OD.neg}'>${ng>=0?'+':''}${odK(ng)}</b>`;
    rows+=`<div class="od-lrow" onmousemove="optTip(event,&quot;${tip}&quot;)" onmouseleave="optTipHide()">`+
      `<div class="od-tag ${cls}">${tag}</div>`+
      `<div class="od-ap">${oiPct.toFixed(1)}%</div>`+
      `<div class="od-bar put"><div class="od-fill put" style="width:${putW.toFixed(1)}%"></div></div>`+
      `<div class="od-strike">${fmtNum(s.strike)}</div>`+
      `<div class="od-bar call"><div class="od-fill call" style="width:${callW.toFixed(1)}%"></div></div>`+
      `<div class="od-net" style="color:${ng>=0?OD.pos:OD.neg}">${ng>=0?'+':'−'}${odK(Math.abs(ng))}</div>`+
      `<div class="od-dist ${dist>=0?'pos':'neg'}">${dist>=0?'+':''}${dist.toFixed(1)}%</div></div>`;
  });
  if(!placed)rows=spotRow+rows;
  return `<div class="od-ladder"><div class="od-lhead"><div>Etiket</div><div>AP%</div><div>Put γ</div><div style="text-align:center">Kullanım</div><div>Call γ</div><div style="text-align:center">Net γ</div><div style="text-align:right">Δ%</div></div>${rows}</div>`;
}

// ── Kilit Seviyeler ──
function odLevels(lv,spot){
  const rows=[['Call Wall','maks. pozitif γ',lv.call_wall,OD.pos],['Beklenen Hareket ↑','1σ hafta sonu',lv.em_ust,OD.neu],['Max Pain','min. yazar ödemesi',lv.max_pain,OD.acc],['Zero Gamma','rejim dönüşümü',lv.zero_gamma,OD.dim],['Beklenen Hareket ↓','1σ hafta sonu',lv.em_alt,OD.neu],['Put Wall','maks. negatif γ',lv.put_wall,OD.neg]].filter(r=>r[2]!=null);
  if(!rows.length)return '<div class="od-empty">yükleniyor…</div>';
  return '<div class="od-sheet-label">Kilit Seviyeler</div>'+rows.map(r=>{
    const n=r[0],sub=r[1],v=r[2],c=r[3];const pct=spot?((v-spot)/spot*100):null;
    return `<div class="od-lvl"><span class="od-dot" style="color:${c}"></span><span><span class="od-lname">${n}</span><span class="od-lsub">${sub}</span></span><span class="od-lval">$${fmtNum(v)}</span><span class="od-ldelta ${pct!=null&&pct>=0?'pos':'neg'}">${pct!=null?(pct>=0?'+':'')+pct.toFixed(2)+'%':'—'}</span></div>`;
  }).join('')+`<div class="od-note" style="margin-top:14px;line-height:1.6;font-size:11px"><b style="color:${OD.mute}">Hull, <i>Options, Futures &amp; Other Derivatives</i> (Böl. 19 — Greekler &amp; dinamik hedge) çerçevesi:</b> Piyasa yapıcılar net opsiyon pozisyonunu delta-nötr tutmak için spot/futures alıp satar; bu hedge akışı seviyeleri "mıknatıs" haline getirir. <b style="color:${OD.pos}">Call Wall</b> en yoğun pozitif gamma strike'ı; spot yükseldikçe dealer delta-hedge için satar → güçlü direnç. <b style="color:${OD.neg}">Put Wall</b> yoğun put gamma/OI destek bölgesi. <b style="color:${OD.dim}">Zero Gamma</b> net dealer gamma'nın işaret değiştirdiği eşik — üstünde long-gamma rejimi volatiliteyi bastırır (mean-reversion), altında short-gamma rejimi hareketi hızlandırır (momentum/breakout). <b style="color:${OD.acc}">Max Pain</b> en çok opsiyonun değersiz bittiği denge fiyatı; vade (özellikle haftalık expiry) yaklaştıkça theta+charm akışı fiyatı buraya çeker (pin etkisi). <b style="color:${OD.neu}">Beklenen Hareket</b> = ATM IV'den türetilen ±1σ haftalık bant (Hull §15 — log-normal fiyat dağılımı).</div>`;
}

// ── ii. KUANTUM DUVARLAR (yatay GEX) ──
function odWalls(t,lv,spot,g){
  const all=(t.strikes||[]).filter(s=>(s.callGex||0)!==0||(s.putGex||0)!==0);
  if(!all.length||!spot)return '<div class="od-empty">GEX verisi yükleniyor…</div>';
  const lo=spot*0.80,hi=spot*1.22;
  const vis=all.filter(s=>s.strike>=lo&&s.strike<=hi).slice().sort((a,b)=>b.strike-a.strike);
  if(!vis.length)return '<div class="od-empty">Bu aralıkta GEX yok.</div>';
  const W=1000,PL=70,PR=98,PT=20,PB=40,H=Math.max(vis.length*16+PT+PB,200);
  const cH=H-PT-PB,cW=W-PL-PR;
  const yS=p=>PT+((hi-p)/(hi-lo))*cH;
  // Eski platform gibi: her strike'ta Call GEX (yeşil) + Put GEX (kırmızı) ÜST ÜSTE,
  // yarı-şeffaf → büyüğün altındaki küçük (negatif) gex de görünür.
  const maxBar=Math.max(...vis.map(s=>Math.max(s.callGex||0,Math.abs(s.putGex||0))),1);
  const rowH=Math.max(cH/vis.length-1,2.5);
  const xBar=v=>(Math.abs(v)/maxBar)*cW*0.9;
  const kLab=v=>{const k=v/1000;return (Number.isInteger(k)?k.toFixed(0):k.toFixed(1))+'K';};
  let body=vis.map(s=>{
    const y=yS(s.strike),cg=s.callGex||0,pg=s.putGex||0,ng=(s.netGamma!=null?s.netGamma:cg+pg);
    const wC=xBar(cg),wP=xBar(pg),yt=(y-rowH/2).toFixed(1),hh=rowH.toFixed(1);
    const rC=`<rect x="${PL}" y="${yt}" width="${wC.toFixed(1)}" height="${hh}" fill="${OD.pos}" opacity="0.5"/>`;
    const rP=`<rect x="${PL}" y="${yt}" width="${wP.toFixed(1)}" height="${hh}" fill="${OD.neg}" opacity="0.5"/>`;
    const bars=wC>=wP?(rC+rP):(rP+rC);  // büyük arkada, küçük önde — ikisi de görünür
    const tip=`$${fmtNum(s.strike)}<br>Net GEX: <b style='color:${ng>=0?OD.pos:OD.neg}'>${ng>=0?'+':''}${odK(ng)}</b><br>Call GEX: <b style='color:${OD.pos}'>+${odK(cg)}</b><br>Put GEX: <b style='color:${OD.neg}'>${odK(pg)}</b><br>Call OI ${fmtNum(s.callOI||0)} · Put OI ${fmtNum(s.putOI||0)}`;
    return `<g onmousemove="optTip(event,&quot;${tip}&quot;)" onmouseleave="optTipHide()">`+
      `<line x1="${PL}" x2="${W-PR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" stroke="${OD.lineS}" stroke-width="0.3"/>`+
      bars+
      `<text x="${PL-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="700" fill="${OD.mute}">${kLab(s.strike)}</text></g>`;
  }).join('');
  const lvls=[[lv.call_wall,'CW',OD.pos],[lv.em_ust,'BH↑',OD.neu],[lv.zero_gamma,'ZΓ',OD.dim],[lv.max_pain,'MA',OD.acc],[lv.em_alt,'BH↓',OD.neu],[lv.put_wall,'PW',OD.neg]].filter(x=>x[0]&&x[0]>=lo&&x[0]<=hi);
  // Seviye + spot etiketleri grafiğin SAĞINA, küçük: "CW 65.457" / "Spot 63.222"
  let roz=lvls.map(x=>{const y=yS(x[0]);return `<line x1="${PL}" x2="${W-PR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" stroke="${x[2]}" stroke-width="0.7" stroke-dasharray="3 5" opacity="0.3"/><text x="${(W-PR+5).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="start" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700" fill="${x[2]}">${x[1]} ${fmtNum(x[0])}</text>`;}).join('');
  let sp='';

  const chart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;cursor:crosshair"><defs><linearGradient id="odcw" x1="0" x2="1"><stop offset="0%" stop-color="${OD.pos}" stop-opacity="0.9"/><stop offset="100%" stop-color="${OD.pos}" stop-opacity="0.18"/></linearGradient><linearGradient id="odpw" x1="0" x2="1"><stop offset="0%" stop-color="${OD.neg}" stop-opacity="0.88"/><stop offset="100%" stop-color="${OD.neg}" stop-opacity="0.14"/></linearGradient></defs>${body}${roz}${sp}</svg>`;
  const top=vis.slice().sort((a,b)=>Math.abs(b.netGamma)-Math.abs(a.netGamma)).slice(0,8);
  const list=top.map((w,i)=>{const pos=w.netGamma>=0,c=pos?OD.pos:OD.neg,pct=(w.strike-spot)/spot*100;
    return `<div style="display:grid;grid-template-columns:22px 1fr auto;gap:6px 10px;align-items:baseline;padding:6px 0;border-bottom:1px solid ${OD.lineS}"><span style="font-size:9px;color:${OD.mute};font-style:italic;font-family:'Space Grotesk',sans-serif">${String(i+1).padStart(2,'0')}</span><div><div style="font-size:11px;color:${c};font-weight:700">$${fmtNum(w.strike)}</div><div style="font-size:8.5px;color:${c};margin-top:1px;font-weight:600">${pos?'Call γ':'Put γ'}</div></div><div style="text-align:right"><div style="font-size:11px;font-weight:700;color:${pct>=0?OD.pos:OD.neg}">${pct>=0?'+':''}${pct.toFixed(1)}%</div><div style="font-size:9px;color:${OD.mute};margin-top:1px">${w.netGamma>=0?'+':'−'}${odK(Math.abs(w.netGamma))}</div></div></div>`;}).join('');
  const duvarAciklama=`<div class="od-note" style="margin-top:14px;line-height:1.6;font-size:11px"><b style="color:${OD.mute}">Hull (Böl. 19, gamma &amp; dinamik hedge):</b> Gamma, delta'nın spota göre değişim hızıdır; dealer'lar delta-nötr kalmak için her fiyat adımında yeniden hedge yapar. <b style="color:${OD.pos}">Pozitif gamma</b> (long-gamma) bölgesinde dealer "yüksekten satıp düşükten alır" → hareketi söndürür, spot büyük bir pozitif duvara (Call Wall) yaklaşınca fiyat sıkışır, duvar tavan/mıknatıs gibi davranır. <b style="color:${OD.neg}">Negatif gamma</b> (short-gamma, genelde spot altı) bölgesinde dealer "yüksekten alıp düşükten satar" → hareketi hızlandırır, kırılımlar sertleşir ve volatilite genişler. <b>Pratik OAR okuması:</b> spot büyük gamma duvarının altındaysa o seviye direnç, üstündeyse destek gibi çalışır; agentlar duvara yakın OAR key-level / fib'den pozisyon kurup duvarın diğer yanına stop yerleştirir.</div>`;
  return `<div class="od-walls"><div>${chart}<div class="od-note">${esc((g&&g.gamma_yorum)||'')}</div></div><div><div class="od-sheet-label" style="font-size:9px">Önemli Duvarlar — Sıralı ↓</div><div style="font-size:11px">${list}</div>${duvarAciklama}</div></div>`;
}

// ── iii. CVD çizgisi (medyan + spot overlay + saatlik tooltip + hacim) ──
function odLine(d,renk,birim,opt){
  opt=opt||{};
  if(!d||!d.seri||!d.seri.length)return '<div class="od-empty">Veri yükleniyor…</div>';
  const S=d.seri;
  const vals=S.map(x=>Number(x.v)).filter(v=>isFinite(v));
  if(vals.length<2)return '<div class="od-empty">Yeterli veri yok</div>';
  const hasVol=!!(d.hacim&&d.hacim.length);
  const W=1000,PL=64,PR=opt.spot?54:16,PT=12,LH=118,G=12,VOLH=34,PB=14;
  const H=hasVol?(PT+LH+G+VOLH+PB):(PT+LH+PB);
  const iw=W-PL-PR,ih=LH,n=S.length;
  const med=isFinite(d.medyan)?Number(d.medyan):vals[vals.length-1];
  let mn=Math.min(...vals,med),mx=Math.max(...vals,med);if(mx===mn){mx+=1;mn-=1;}
  const pad=(mx-mn)*0.08;mn-=pad;mx+=pad;
  const X=i=>PL+(n<=1?iw/2:(i/(n-1))*iw);
  const Y=v=>PT+(1-(v-mn)/(mx-mn))*ih;
  const path=vals.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const medY=Y(med).toFixed(1);
  const fY=v=>birim==='$'?('$'+odK(v)):odK(v);
  const last=vals[vals.length-1];
  const grid=[mx,(mx+mn)/2,mn].map(v=>`<line x1="${PL}" x2="${W-PR}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" stroke="${OD.line}" stroke-width="1"/><text x="${PL-8}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="9" fill="${OD.mute}">${fY(v)}</text>`).join('');
  // spot overlay (sağ eksen, turuncu) — Image 2 gibi
  let spotSvg='';
  if(opt.spot){
    const sp=S.map(x=>x.spot==null?null:Number(x.spot)),sv=sp.filter(v=>v!=null&&isFinite(v));
    if(sv.length>1){
      let smn=Math.min(...sv),smx=Math.max(...sv);if(smx===smn){smx+=1;smn-=1;}
      const spad=(smx-smn)*0.12;smn-=spad;smx+=spad;
      const SY=v=>PT+(1-(v-smn)/(smx-smn))*ih;
      let sd='',started=false;
      sp.forEach((v,i)=>{if(v==null)return;sd+=(started?'L':'M')+X(i).toFixed(1)+','+SY(v).toFixed(1)+' ';started=true;});
      const rg=[smx,(smx+smn)/2,smn].map(v=>`<text x="${W-PR+6}" y="${(SY(v)+3).toFixed(1)}" text-anchor="start" font-family="'JetBrains Mono',monospace" font-size="9" fill="${OD.sell}" opacity="0.85">${odK(v)}</text>`).join('');
      spotSvg=`<path d="${sd.trim()}" fill="none" stroke="${OD.sell}" stroke-width="1.6" stroke-linejoin="round" opacity="0.9"/>${rg}`;
    }
  }
  // hacim (kova bazlı alım/satım, çizgiyle hizalı)
  let vol='';
  if(hasVol){
    const hb=d.hacim,vb=PT+LH+G+VOLH;
    const maxV=Math.max(...hb.map(h=>(h.buy||0)+(h.sell||0)),1);
    const bwv=Math.max(iw/hb.length*0.7,1);
    vol=`<text x="${PL-8}" y="${(PT+LH+G+9).toFixed(1)}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="8" fill="${OD.mute}">HACİM</text>`+
      hb.map((h,i)=>{const x=PL+(n<=1?iw/2:(i/(n-1))*iw),tot=(h.buy||0)+(h.sell||0),hh=Math.max(tot/maxV*VOLH,0.6),net=(h.buy||0)-(h.sell||0),col=net>=0?OD.pos:OD.neg;
        return `<rect x="${(x-bwv/2).toFixed(1)}" y="${(vb-hh).toFixed(1)}" width="${bwv.toFixed(1)}" height="${hh.toFixed(1)}" fill="${col}" opacity="0.5"/>`;}).join('');
  }
  // saatlik hover sütunları → tooltip (Image 2'deki kutu)
  const colW=iw/Math.max(n,1),hovH=hasVol?(LH+G+VOLH):ih;
  const hov=S.map((p,i)=>{const x=X(i),dt=new Date(p.ts),hh=String(dt.getHours()).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0'),mo=String(dt.getMonth()+1).padStart(2,'0');
    let tip;
    if(opt.detay){tip=`${dd}.${mo} ${hh}:00<br>Call Buy (+): <b style='color:${OD.pos}'>${fmtNum(p.cb||0)}</b><br>Call Sell (−): <b style='color:${OD.neg}'>${fmtNum(p.cs||0)}</b><br>Put Buy (−): <b style='color:${OD.neg}'>${fmtNum(p.pb||0)}</b><br>Put Sell (+): <b style='color:${OD.pos}'>${fmtNum(p.ps||0)}</b><br>Saat Δ: <b style='color:${(p.delta||0)>=0?OD.pos:OD.neg}'>${(p.delta||0)>=0?'+':''}${fmtNum(p.delta||0)}</b> · CVD: <b style='color:${OD.text}'>${fY(p.v)}</b>`;}
    else{tip=`${dd}.${mo} ${hh}:00<br>${birim==='$'?'Premium':'CVD'}: <b style='color:${renk}'>${fY(p.v)}</b>`;}
    return `<rect x="${(x-colW/2).toFixed(1)}" y="${PT}" width="${colW.toFixed(1)}" height="${hovH.toFixed(1)}" fill="transparent" onmousemove="optTip(event,&quot;${tip}&quot;)" onmouseleave="optTipHide()"/>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;cursor:crosshair">${grid}<line x1="${PL}" x2="${W-PR}" y1="${medY}" y2="${medY}" stroke="${OD.text}" stroke-width="1" stroke-dasharray="6 4" opacity="0.55"/><text x="${W-PR}" y="${(medY-5)}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="8.5" fill="${OD.text}" opacity="0.7">MEDYAN ${fY(med)}</text>${spotSvg}<path d="${path}" fill="none" stroke="${renk}" stroke-width="2" stroke-linejoin="round"/><circle cx="${X(vals.length-1).toFixed(1)}" cy="${Y(last).toFixed(1)}" r="4" fill="${renk}"/>${vol}${hov}</svg>`;
}
function odCvd(d,baslik,birim,aciklama,opt){
  const yon=d&&d.yon,renk=yon==='YUKARI'?OD.pos:yon==='AŞAĞI'?OD.neg:OD.neu;
  const fmtV=v=>birim==='$'?('$'+fmtNum(v)):fmtNum(v);
  const dv=d&&d.divergence;
  const dvBadge=dv?`<span class="od-pill" style="background:${dv.tip==='BULLISH'?OD.pos:OD.neg}">⚠ ${dv.tip} DIVERGENCE</span>`:'';
  const head=`<div class="od-cvd-h"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span class="od-cvd-t">${baslik}</span>${d&&d.yon?`<span class="od-pill" style="background:${renk}">${yon==='YUKARI'?'▲ YUKARI':yon==='AŞAĞI'?'▼ AŞAĞI':'— NÖTR'}</span>`:''}${dvBadge}</div>${d&&d.guncel!=null?`<div style="font-size:10px;color:${OD.mute}">Net: <b style="color:${renk};font-size:12px">${fmtV(d.guncel)}</b> · Medyan: <b style="color:${OD.text}">${fmtV(d.medyan)}</b></div>`:''}</div>`;
  return `<div style="margin-bottom:18px">${head}${odLine(d,renk,birim,opt)}<div class="od-note">${aciklama}</div></div>`;
}

// ── Gamma / Buy-Sell per strike (histogram) ──
function odGammaStrike(arr,spot){
  if(!arr||!arr.length)return '<div class="od-empty">Veri yükleniyor…</div>';
  const W=1000,H=240,PT=20,PR=28,PB=40,PL=52,cW=W-PL-PR,cH=H-PT-PB;
  const lo=Math.min(...arr.map(d=>d.strike)),hi=Math.max(...arr.map(d=>d.strike)),span=(hi-lo)||1;
  const X=s=>PL+((s-lo)/span)*cW;
  const yMax=Math.max(...arr.map(d=>Math.abs(d.net)),1e-6)*1.1,zY=PT+cH/2;
  const bw=Math.max(cW/arr.length*0.55,1);
  const bars=arr.map(d=>{const x=X(d.strike),h=Math.abs(d.net)/yMax*(cH/2);if(h<0.4)return '';const pos=d.net>=0;
    const tip=`$${fmtNum(d.strike)}<br>Net Γ: <b style='color:${pos?OD.pos:OD.neg}'>${d.net>=0?'+':''}${d.net}M</b>`;
    return `<rect x="${(x-bw/2).toFixed(1)}" y="${(pos?zY-h:zY).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${pos?OD.pos:OD.neg}" opacity="0.88" onmousemove="optTip(event,&quot;${tip}&quot;)" onmouseleave="optTipHide()"/>`;}).join('');
  let xt='';for(let p=Math.ceil(lo/8000)*8000;p<=hi;p+=8000){const x=X(p);xt+=`<text x="${x.toFixed(1)}" y="${H-PB+18}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="${OD.mute}">${(p/1000).toFixed(0)}K</text>`;}
  let sp='';if(spot){const x=X(spot);sp=`<line x1="${x.toFixed(1)}" x2="${x.toFixed(1)}" y1="${PT}" y2="${H-PB}" stroke="${OD.acc}" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/><text x="${x.toFixed(1)}" y="${PT-4}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="${OD.acc}">SPOT</text>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;cursor:crosshair"><line x1="${PL}" x2="${W-PR}" y1="${zY}" y2="${zY}" stroke="${OD.lineH}" stroke-width="1"/>${bars}${sp}${xt}</svg>`;
}
function odBuySell(arr,spot){

    const tip=`$${fmtNum(d.strike)}<br>Buy: <b style='color:${OD.buy}'>${fmtNum(d.buy||0)}</b><br>Sell: <b style='color:${OD.sell}'>${fmtNum(d.sell||0)}</b>`;

  let sp='';if(spot){const x=X(spot);sp=`<line x1="${x.toFixed(1)}" x2="${x.toFixed(1)}" y1="${PT}" y2="${H-PB}" stroke="${OD.acc}" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;cursor:crosshair"><line x1="${PL}" x2="${W-PR}" y1="${zY}" y2="${zY}" stroke="${OD.lineH}" stroke-width="1"/>${bars}${sp}${xt}</svg><div style="display:flex;gap:16px;margin-top:6px;font-size:9px;color:${OD.dim}"><span style="color:${OD.buy}">▲ Buy (üst)</span><span style="color:${OD.sell}">▼ Sell (alt)</span></div>`;

// ── v. Volatilite Yüzeyi ──

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><defs><linearGradient id="odiv" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${OD.acc}" stop-opacity="0.18"/><stop offset="100%" stop-color="${OD.acc}" stop-opacity="0.01"/></linearGradient></defs>${grid}<path d="${fill}" fill="url(#odiv)"/><path d="${path}" fill="none" stroke="${OD.acc}" stroke-width="2"/>${dots}</svg>`;

function odRR(arr){
  const rows=(arr||[]).map(x=>Number(x.rr)).filter(v=>isFinite(v)).slice(0,14);

  const W=620,H=220,PL=52,PR=24,PT=24,PB=30,cW=W-PL-PR,cH=H-PT-PB;

  const bw=Math.max(8,Math.min(36,cW/rows.length*0.6));
  const bars=rows.map((v,i)=>{const x=X(i),top=v>=0?Y(v):y0,h=Math.max(Math.abs(Y(v)-y0),2),renk=v>=0?OD.neg:OD.pos;
    return `<rect x="${(x-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${renk}" opacity="0.62" rx="1"/><line x1="${(x-bw/2).toFixed(1)}" x2="${(x+bw/2).toFixed(1)}" y1="${top.toFixed(1)}" y2="${top.toFixed(1)}" stroke="${renk}" stroke-width="1.5"/><text x="${x.toFixed(1)}" y="${(v>=0?top-5:top+h+12).toFixed(1)}" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700" fill="${OD.t2}">${v>=0?'+':''}${v.toFixed(1)}</text>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><line x1="${PL}" x2="${W-PR}" y1="${y0.toFixed(1)}" y2="${y0.toFixed(1)}" stroke="${OD.lineH}" stroke-width="1.2"/><text x="${PL-5}" y="${(y0+3).toFixed(1)}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700" fill="${OD.dim}">0</text>${bars}</svg>`;
}

// ── vi. Pozisyon · Analiz ──
function odPozisyon(lv,spot,g,oy){
  const cw=lv.call_wall||0,pw=lv.put_wall||0,band=cw-pw;

function scrSystemKutular(){
  const d=ST.devops||{};
  const dep=d.render_deploys||{}, env=d.render_env||{}, gh=d.github_commits||{};

  const durRenk=s=>({live:'#1ff0ad',succeeded:'#1ff0ad',build_in_progress:'#ffb13c',update_in_progress:'#ffb13c',deactivated:'#5e716f',build_failed:'#ff5d6c',canceled:'#ff5d6c',failed:'#ff5d6c'}[s]||'#9fb0ad');
  const zf=t=>{if(!t)return'';try{return new Date(t).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return t.slice(0,16);}};

  const baglantiUyari=(o,ad)=>`<div class="card" style="padding:16px;border-color:#3a2a1a">
    <div style="font-size:11px;color:#ffb13c">⚠ ${ad} bağlı değil</div>
    <div style="font-size:10px;color:#7d908d;margin-top:6px;line-height:1.6">${o.neden||''}</div>

    <span style="color:#8a9c99">RENDER_API_KEY</span> · <span style="color:#8a9c99">RENDER_SERVICE_ID</span> · <span style="color:#8a9c99">GITHUB_TOKEN</span> · <span style="color:#8a9c99">GITHUB_REPO</span></div>
  </div>`;

  let depHtml;
  if(!dep.bagli){depHtml=baglantiUyari(dep,'Render API');}
  else{
    depHtml=`<div class="card" style="overflow:hidden">
      <div class="sg" style="padding:12px 15px;border-bottom:1px solid #18211f;font-size:9.5px;letter-spacing:.14em;color:#5e716f">SON DEPLOYLAR</div>
      ${(dep.deploys||[]).map(x=>`<div style="display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid #131918">
        <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${durRenk(x.durum)};box-shadow:0 0 7px ${durRenk(x.durum)}"></span>
        <div style="min-width:0;flex:1">
          <div style="font-size:10.5px;color:#c4d2cf;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.commit_msg||x.id)}</div>
          <div style="font-size:9px;color:#5e716f;margin-top:2px">${x.commit_id} · ${zf(x.olusturma)}</div>
        </div>
        <span style="font-size:9px;font-weight:600;color:${durRenk(x.durum)};flex-shrink:0">${x.durum}</span>
      </div>`).join('')}
    </div>`;
  }

  let ghHtml;
  if(!gh.bagli){ghHtml=baglantiUyari(gh,'GitHub API');}
  else{
    ghHtml=`<div class="card" style="overflow:hidden">
      <div class="sg" style="padding:12px 15px;border-bottom:1px solid #18211f;font-size:9.5px;letter-spacing:.14em;color:#5e716f">SON COMMIT'LER</div>
      ${(gh.commits||[]).map(x=>`<div style="display:flex;align-items:flex-start;gap:11px;padding:10px 15px;border-bottom:1px solid #131918">
        <span style="font-size:9px;color:#56a8ff;font-weight:600;flex-shrink:0;margin-top:2px">${x.sha}</span>
        <div style="min-width:0;flex:1">
          <div style="font-size:10.5px;color:#c4d2cf;line-height:1.4">${esc(x.mesaj)}</div>
          <div style="font-size:9px;color:#5e716f;margin-top:2px">${esc(x.yazar)} · ${zf(x.tarih)}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  const envHtml='';

  return `
  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button onclick="loadDevops(true)" class="sg" style="background:#0a0f0f;border:1px solid #1a2422;color:#9fb0ad;border-radius:7px;padding:6px 12px;font-size:10px;cursor:pointer">🔄 Yenile</button>

let _chatFile=null;
function chatDosyaSecildi(el){
  const f=el.files&&el.files[0];if(!f)return;
  _chatFile=f;
  const ad=$('chat-eklenti-ad');if(ad)ad.textContent='📎 '+f.name+' ('+(f.size/1024).toFixed(0)+' KB)';
  const box=$('chat-eklenti');if(box)box.style.display='flex';
  const ogr=$('chat-ogret-satir');if(ogr)ogr.style.display='block';
  const inp=$('chatin');if(inp&&!inp.value)inp.value='Bu dosyayı analiz et';
}
function chatDosyaTemizle(){
  _chatFile=null;
  const box=$('chat-eklenti');if(box)box.style.display='none';
  const ogr=$('chat-ogret-satir');if(ogr)ogr.style.display='none';
  const fi=$('chatfile');if(fi)fi.value='';
}
async function dosyaOgret(){
  if(!_chatFile){alert('Önce dosya seç');return;}
  const f=_chatFile;
  ST.chat.push({role:'user',txt:'📚 Öğret: '+f.name});
  ST.chat.push({role:'agent',txt:'⏳ Bilgi tabanına ekleniyor...'});
  updateChatOnly();
  const fd=new FormData();fd.append('file',f);fd.append('category','strateji');
  try{
    const r=await fetch('/api/knowledge/document',{method:'POST',body:fd});
    const d=await r.json();
    ST.chat.pop();
    if(r.ok){
      const isImg=/\.(png|jpg|jpeg|gif|webp)$/i.test(f.name);
      let msg='✅ Öğrendim: **'+(d.title||f.name)+'**';
      if(isImg&&d.onizleme){msg+=' — Grafik analiz edildi:\n\n'+d.onizleme;}
      else{msg+=' ('+(d.chunks||'?')+' parça, '+(d.total_words||'?')+' kelime). Artık stratejini sorularında kullanacağım.';}
      ST.chat.push({role:'agent',txt:msg});
    }
    else{ST.chat.push({role:'agent',txt:'❌ '+((d&&d.detail)||'Yükleme başarısız')});}
  }catch(e){ST.chat.pop();ST.chat.push({role:'agent',txt:'❌ Hata: '+e});}
  chatDosyaTemizle();updateChatOnly();
}
async function send(){
  const inp=$('chatin');if(!inp)return;const q=inp.value.trim();
  if(_chatFile){
    const f=_chatFile;
    ST.chat.push({role:'user',txt:(q||'Bu dosyayı analiz et')+' 📎'+f.name});
    ST.chat.push({role:'agent',txt:'⏳ Dosya okunuyor...'});
    inp.value='';updateChatOnly();
    const fd=new FormData();fd.append('message',q||'Bu dosyayı analiz et');fd.append('file',f);
    try{
      const r=await fetch('/api/chat',{method:'POST',body:fd});
      const d=await r.json();
      ST.chat.pop();
      ST.chat.push({role:'agent',txt:(d&&(d.reply||d.cevap||d.response))||'Yanıt alınamadı'});
    }catch(e){ST.chat.pop();ST.chat.push({role:'agent',txt:'❌ Hata: '+e});}
    chatDosyaTemizle();updateChatOnly();return;
  }
  if(!q)return;inp.value='';
  ST.chat.push({role:'user',txt:q});
  ST.chat.push({role:'agent',txt:'⏳ Analiz ediliyor...'});
  updateChatOnly();  // tüm ekranı değil, sadece sohbeti güncelle
  const d=await jpost('/api/leader/chat',{soru:q});
  ST.chat.pop();  // typing mesajını çıkar
  ST.chat.push({role:'agent',txt:(d&&d.cevap)||'Yanıt alınamadı'});
  updateChatOnly();
}

let _lchart,_lcandle,_locvd,_locvdLine,_lpriceLines=[];
async function renderLeaderChart(){
  const el=document.getElementById('lchart');
  if(!el||typeof LightweightCharts==='undefined')return;
  // grafik bir kez kur
  if(!_lchart){
    _lchart=LightweightCharts.createChart(el,{
      layout:{background:{color:'#0c1112'},textColor:'#5e716f'},
      grid:{vertLines:{color:'#141d1b'},horzLines:{color:'#141d1b'}},
      timeScale:{borderColor:'#18211f',timeVisible:true},
      rightPriceScale:{borderColor:'#18211f'},
      width:el.clientWidth,height:230});
    _lcandle=_lchart.addCandlestickSeries({upColor:'#1ff0ad',downColor:'#ff5d6c',
      borderUpColor:'#1ff0ad',borderDownColor:'#ff5d6c',wickUpColor:'#1ff0ad',wickDownColor:'#ff5d6c'});
    const ocel=document.getElementById('ocvdchart');
    _locvd=LightweightCharts.createChart(ocel,{
      layout:{background:{color:'#0c1112'},textColor:'#5e716f'},
      grid:{vertLines:{color:'#141d1b'},horzLines:{color:'#141d1b'}},
      timeScale:{visible:false},rightPriceScale:{borderColor:'#18211f'},
      width:ocel.clientWidth,height:80});
    _locvdLine=_locvd.addLineSeries({color:'#8b5cf6',lineWidth:2});
    new ResizeObserver(()=>{if(_lchart)_lchart.applyOptions({width:el.clientWidth});if(_locvd)_locvd.applyOptions({width:document.getElementById('ocvdchart').clientWidth});}).observe(el);
  }
  // mum verisi
  const oh=await jget('/api/ohlcv?symbol=BTCUSDT&interval=5m&limit=200');
  if(oh&&oh.candles){
    _lcandle.setData(oh.candles.map(c=>({time:Math.floor(c.ts/1000),open:c.open,high:c.high,low:c.low,close:c.close})));
  }
  // opsiyon seviyeleri (0-7g) + OAR fib çizgileri
  _lpriceLines.forEach(l=>_lcandle.removePriceLine(l));_lpriceLines=[];
  const lv=await jget('/api/options/levels?currency=BTC');
  if(lv&&lv.kisa){
    const k=lv.kisa;
    [['call_wall','#1ff0ad','CW'],['put_wall','#ff5d6c','PW'],['zero_gamma','#ffb13c','ZG']].forEach(([key,col,t])=>{
      if(k[key])_lpriceLines.push(_lcandle.createPriceLine({price:k[key],color:col,lineWidth:1,lineStyle:t==='ZG'?2:0,title:t}));
    });
  }
  // OAR fib (Asia range TR 03-07 → fib 0.377/0.618)
  const fib=await jget('/api/oar-fib?symbol=BTCUSDT');
  if(fib&&fib.seviyeler){
    Object.entries(fib.seviyeler).forEach(([ad,fiyat])=>{
      _lpriceLines.push(_lcandle.createPriceLine({price:fiyat,color:'#56a8ff',lineWidth:1,lineStyle:2,title:'fib '+ad}));
    });
  }
  // opsiyon CVD
  const ocvd=await jget('/api/options/cvd?currency=BTC');
  if(ocvd&&ocvd.data){
    _locvdLine.setData(ocvd.data.map((p,i)=>({time:Math.floor(p.ts/1000),value:p.cvd})));
    const yel=document.getElementById('ocvd-yon');
    if(yel)yel.innerHTML=`${ocvd.yon==='YUKARI'?'<span style="color:#1ff0ad">▲ YUKARI</span>':'<span style="color:#ff5d6c">▼ AŞAĞI</span>'} · güncel ${ocvd.guncel}`;
  }
}

  if(topo&&!topo.error)ST.optTopo=topo;
  if(greek&&!greek.error)ST.optGreek=greek;
  if(skew&&!skew.error)ST.optSkew=skew;
  if(cvd&&!cvd.error)ST.optCvd=cvd;
  if(dag&&!dag.error)ST.optDagilim=dag;
  if(yorum)ST.opsiyonYorum=yorum;
  if(ST.tab==='options')render();
}
async function loadKnowledge(){
  const d=await jget('/api/knowledge');if(d)ST.knowledge=d;
  const k=await jget('/api/knowledge/kitaplar');if(k)ST.kitapStat=k;
  if(!ST.devops)await loadDevops(false);
  if(ST.tab==='knowledge')render();
}
async function loadBasariSkoru(){const d=await jget('/api/basari-skoru');if(d)ST.basariSkoru=d;}
async function loadMakro(){const d=await jget('/api/makro');if(d)ST.makro=d;const o=await jget('/api/makro/ozet');if(o)ST.makroOzet=o;const cr=await jget('/api/makro/carry');if(cr)ST.makroCarry=cr;if(ST.tab==='macro')render();}
async function loadDevops(force){const d=await jget('/api/devops');if(d)ST.devops=d;if(force&&ST.tab==='knowledge')render();}
async function loadFeed(){
  const d=await jget('/api/leader/rapor-gecmisi?limit=10');
  if(d&&d.raporlar){
    const renk={lider:'#1ff0ad',backtest:'#ffb13c',research:'#56a8ff'};
    const ad={lider:'Lider Agent',backtest:'Backtest Agent',research:'Research Agent'};
    ST.feed=d.raporlar.slice().reverse().map(r=>({
      t:new Date(r.tarih).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}),
      a:ad[r.tip]||r.tip,col:renk[r.tip]||'#9fb0ad',
      txt:(r.icerik&&r.icerik.metin)||''
    }));
  }
}
async function loadFng(){
  const d=await jget('/api/market');
  // F&G ayrı endpoint yok, market-context'te korku endeksi olabilir; fallback
}

// ════════════ INIT ════════════
async function boot(){
  renderNav();render();
  tickClock();setInterval(tickClock,1000);
  await Promise.all([loadSignals(),loadReport(),loadContext(),loadTheories(),loadFeed(),loadKnowledge(),loadIndicators(),loadOptScore(),loadOarFib(),loadPiyasaDurumu(),loadOpsiyonYorum(),loadBasariSkoru(),loadGrafikYorum(),loadKarar(),loadPaper(),loadHipotez()]);
  render();
  loadTicker();loadOptions();
  setInterval(async()=>{await loadSignals();await loadContext();await loadIndicators();await loadOptScore();await loadOarFib();
    if(ST.tab==='live'){updateFeedOnly();}
    else if(['leader','live'].includes(ST.tab))render();},120000);
  setInterval(async()=>{await loadReport();await loadFeed();await loadPiyasaDurumu();await loadOpsiyonYorum();await loadGrafikYorum();await loadKarar();await loadPaper();await loadHipotez();
    if(ST.tab==='live'){updateFeedOnly();updateCioPaperOnly();}
    else if(ST.tab==='leader')render();},300000);
  setInterval(loadTicker,60000);
}
boot();
</script>
