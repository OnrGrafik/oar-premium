<!DOCTYPE html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OAR Premium — Multi-Agent Quant OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:#07090a;color:#cdd9d8;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#1c2625;border-radius:5px}
::-webkit-scrollbar-track{background:#0a0d0e}
@keyframes oarblink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes oarticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes oarfeedin{0%{opacity:0;transform:translateY(-7px)}100%{opacity:1;transform:translateY(0)}}
@keyframes oarpulse{0%,100%{opacity:.5}50%{opacity:1}}
.sg{font-family:'Space Grotesk',sans-serif}
.navbtn{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:7px;border:1px solid transparent;background:none;color:#8a9c99;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;width:100%;transition:.15s}
.navbtn:hover{filter:brightness(1.3)}
.navbtn.active{background:#10171680;border-color:#1c302a;color:#eaf4f2}
.card{background:#0c1112;border:1px solid #18211f;border-radius:9px}
input,button{font-family:'JetBrains Mono',monospace}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<div style="display:flex;height:100vh;width:100vw;overflow:hidden;background:#07090a">

  <!-- SIDEBAR -->
  <aside style="width:230px;flex-shrink:0;background:#090c0d;border-right:1px solid #161e1d;display:flex;flex-direction:column">
    <div style="padding:17px 17px 15px;border-bottom:1px solid #141b1a;display:flex;align-items:center;gap:11px">
      <div class="sg" style="width:31px;height:31px;border-radius:8px;background:linear-gradient(140deg,#1ff0ad,#0a8f66);display:flex;align-items:center;justify-content:center;font-weight:700;color:#04130d;font-size:15px;box-shadow:0 0 16px rgba(21,224,160,.25)">◆</div>
      <div>
        <div class="sg" style="font-weight:700;font-size:15px;letter-spacing:.03em;color:#eaf4f2;line-height:1">OAR<span style="color:#1ff0ad"> PREMIUM</span></div>
        <div style="font-size:8.5px;letter-spacing:.16em;color:#4a5b59;margin-top:5px">MULTI-AGENT QUANT OS</div>
      </div>
    </div>
    <nav id="nav" style="padding:11px 9px;display:flex;flex-direction:column;gap:3px"></nav>
    <div style="margin-top:auto;padding:12px 13px 13px;border-top:1px solid #141b1a">
      <div class="sg" style="font-size:9px;letter-spacing:.16em;color:#4a5b59;margin-bottom:9px;display:flex;justify-content:space-between">
        <span>AKTİF BOTLAR</span><span style="color:#1ff0ad" id="botcount">— / 10</span>
      </div>
      <div id="botrail" style="display:flex;flex-direction:column;gap:5px"></div>
      <div style="margin-top:11px;padding-top:10px;border-top:1px solid #141b1a;display:flex;align-items:center;gap:7px;font-size:9.5px;color:#5e716f">
        <span style="width:6px;height:6px;border-radius:50%;background:#56a8ff"></span>
        <span>Gemini 2.5 → Groq fallback</span>
      </div>
    </div>
  </aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <!-- HEADER TICKER -->
    <header style="height:46px;flex-shrink:0;border-bottom:1px solid #161e1d;background:#090c0d;display:flex;align-items:center;overflow:hidden">
      <div style="flex:1;overflow:hidden;height:100%;position:relative;-webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent)">
        <div id="ticker" style="display:flex;width:max-content;animation:oarticker 55s linear infinite"></div>
      </div>
      <div style="display:flex;align-items:center;gap:15px;padding:0 18px;border-left:1px solid #161e1d;height:100%;flex-shrink:0">
        <span style="font-size:10.5px;color:#6f8180">F&amp;G <span id="fng" style="color:#ffb13c;font-weight:600">—</span></span>
        <span style="font-size:11px;color:#6f8180">TR <span id="clock" style="color:#cdd9d8">—</span></span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#1ff0ad"><span style="width:7px;height:7px;border-radius:50%;background:#1ff0ad;animation:oarblink 1.6s infinite"></span>CANLI</span>
      </div>
    </header>

    <main id="screen" style="flex:1;overflow-y:auto;padding:18px 20px 28px"></main>
  </div>
</div>

<script>
// ════════════ STATE ════════════
const ST = {tab:'leader', clock:'', chat:[], feed:[], signals:[], report:{}, ctx:{}, theories:[], selTheory:null, kbQuery:''};
const API = '';

const NAV = [
  {id:'leader',  icon:'◆', label:'Komuta Merkezi'},
  {id:'options', icon:'∑', label:'Opsiyon & GEX'},
  {id:'macro',   icon:'▦', label:'Makro Ekonomi'},
  {id:'live',    icon:'◈', label:'Canlı Panel'},
  {id:'agents',  icon:'⬡', label:'Agentlar & Botlar'},
  {id:'theory',  icon:'⚗', label:'Theory Lab'},
  {id:'knowledge',icon:'⛁', label:'Bilgi / Hafıza'},
];

const BOTS = [
  {name:'OAR Kombo',    tf:'5m',  dot:'#f43f5e', tip:'sinyal'},
  {name:'OAR Pattern',  tf:'15m', dot:'#1ff0ad', tip:'sinyal'},
  {name:'UTBot',        tf:'5m',  dot:'#1ff0ad', tip:'sinyal'},
  {name:'MA Scanner',   tf:'1d',  dot:'#ffb13c', tip:'sinyal'},
  {name:'CVD Scanner',  tf:'10m', dot:'#8b5cf6', tip:'sinyal'},
  {name:'Asia Ekstrem', tf:'15m', dot:'#56a8ff', tip:'sinyal'},
  {name:'Volume Bot',   tf:'1h',  dot:'#ec4899', tip:'sinyal'},
  {name:'Balina Bot',   tf:'tick',dot:'#06b6d4', tip:'bilgi'},
  {name:'Korelasyon',   tf:'1d',  dot:'#84cc16', tip:'bilgi'},
  {name:'Whale Tracker',tf:'tick',dot:'#f97316', tip:'bilgi'},
  {name:'Makro Alarm',  tf:'4h',  dot:'#a855f7', tip:'bilgi'},
];

// ════════════ HELPERS ════════════
const $ = id => document.getElementById(id);
async function jget(u){try{const r=await fetch(API+u);return await r.json();}catch(e){return null;}}
async function jpost(u,b){try{const r=await fetch(API+u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});return await r.json();}catch(e){return null;}}
function esc(s){return (s||'').replace(/</g,'&lt;');}
function fmtNum(n){return Number(n).toLocaleString('en-US');}

// Sparkline SVG
function spark(vals,color,w,hh){
  if(!vals||vals.length<2)return '';
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>[(i/(vals.length-1))*w,hh-2-((v-min)/rng)*(hh-4)]);
  const line='M'+pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L ');
  const id='sp'+Math.round(Math.random()*1e6);
  return `<svg width="100%" height="${hh}" viewBox="0 0 ${w} ${hh}" preserveAspectRatio="none" style="display:block">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${line} L ${w} ${hh} L 0 ${hh} Z" fill="url(#${id})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// ════════════ NAV + RAIL ════════════
function renderNav(){
  $('nav').innerHTML = NAV.map(n=>`
    <button class="navbtn ${ST.tab===n.id?'active':''}" onclick="go('${n.id}')">
      <span style="width:17px;display:flex;justify-content:center;flex-shrink:0">${n.icon}</span>
      <span style="flex:1;text-align:left">${n.label}</span>
    </button>`).join('');
}
function renderRail(){
  const aktif = BOTS.filter(b=>(ST.signals||[]).some(s=>(s.bot||'').toLowerCase().includes(b.name.toLowerCase().split(' ')[0].toLowerCase())));
  $('botcount').textContent = `${BOTS.length} / 10`;
  $('botrail').innerHTML = BOTS.map(b=>`
    <div style="display:flex;align-items:center;gap:8px;font-size:10px">
      <span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${b.dot};box-shadow:0 0 6px ${b.dot};animation:oarpulse 2.4s infinite"></span>
      <span style="flex:1;color:#8a9c99;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.name}</span>
      <span style="color:#4a5b59;font-size:9px">${b.tf}</span>
    </div>`).join('');
}
function go(tab){ST.tab=tab;renderNav();render();if(tab==='system'&&!ST.devops)loadDevops(true);if(tab==='options')loadOptionsFull();if(tab==='macro'&&!ST.makro)loadMakro();if(tab==='agents')loadBasariSkoru();if(tab==='theory'&&!ST.theoryHipotez)loadTheoryHipotez();}

// ════════════ TICKER ════════════
async function loadTicker(){
  const d = await jget('/api/ticker');
  let items = [];
  if(d && d.items){
    items = d.items.map(c=>({sym:c.sym,
      price: c.sym==='Altın'||c.sym==='Gümüş'||c.sym==='VIX'?('$'+fmtNum(c.price)):(c.price>100?('$'+fmtNum(Math.round(c.price))):('$'+c.price)),
      chg:(c.chg>=0?'+':'')+c.chg+'%',
      col:c.chg>=0?'#1ff0ad':'#ff5d6c'}));
  }
  if(!items.length)items=[{sym:'BTC',price:'—',chg:'',col:'#9fb0ad'}];
  const html = items.map(t=>`<span style="display:inline-flex;align-items:center;gap:7px;padding:0 15px;border-right:1px solid #131918;height:46px">
    <span style="color:#9fb0ad;font-weight:600">${t.sym}</span><span style="color:#cdd9d8">${t.price}</span><span style="color:${t.col};font-size:11px">${t.chg}</span></span>`).join('');
  $('ticker').innerHTML = html+html;
}

function tickClock(){
  const now=new Date();
  const tr=new Date(now.toLocaleString('en-US',{timeZone:'Europe/Istanbul'}));
  ST.clock=tr.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if($('clock'))$('clock').textContent=ST.clock;
}

// ════════════ SCREENS ════════════
function render(){
  const m=$('screen');
  if(ST.tab==='leader'){m.innerHTML=scrLeader();setTimeout(renderKomutaChart,60);}
  else if(ST.tab==='agents')m.innerHTML=scrAgents();
  else if(ST.tab==='theory')m.innerHTML=scrTheory();
  else if(ST.tab==='options')m.innerHTML=scrOptions();
  else if(ST.tab==='knowledge')m.innerHTML=scrKnowledge();
  else if(ST.tab==='live')m.innerHTML=scrLive();
  else if(ST.tab==='system')m.innerHTML=scrSystem();
  else if(ST.tab==='macro')m.innerHTML=scrMacro();
}

// ─── KOMUTA MERKEZİ: GRAFİK + SKOR PANELİ ───
// ─── KOMUTA MERKEZİ (v3) ───
let _kchart,_kcandle,_kpriceLines=[],_kcoin='BTCUSDT';
async function renderKomutaChart(){
  const el=document.getElementById('kchart');
  if(!el||typeof LightweightCharts==='undefined')return;
  if(!_kchart){
    _kchart=LightweightCharts.createChart(el,{
      layout:{background:{color:'#0c1112'},textColor:'#5e716f'},
      grid:{vertLines:{color:'#141d1b'},horzLines:{color:'#141d1b'}},
      timeScale:{borderColor:'#18211f',timeVisible:true},
      rightPriceScale:{borderColor:'#18211f'},
      width:el.clientWidth,height:300});
    _kcandle=_kchart.addCandlestickSeries({upColor:'#1ff0ad',downColor:'#ff5d6c',
      borderUpColor:'#1ff0ad',borderDownColor:'#ff5d6c',wickUpColor:'#1ff0ad',wickDownColor:'#ff5d6c'});
    new ResizeObserver(()=>{if(_kchart)_kchart.applyOptions({width:el.clientWidth});}).observe(el);
  }
  const oh=await jget('/api/ohlcv?symbol='+_kcoin+'&interval=5m&limit=200');
  if(oh&&oh.candles)_kcandle.setData(oh.candles.map(c=>({time:Math.floor(c.ts/1000),open:c.open,high:c.high,low:c.low,close:c.close})));
  _kpriceLines.forEach(l=>_kcandle.removePriceLine(l));_kpriceLines=[];
  // OAR fib (Asia range)
  const fib=await jget('/api/oar-fib?symbol='+_kcoin);
  if(fib&&fib.seviyeler){
    Object.entries(fib.seviyeler).forEach(([ad,fiyat])=>{
      _kpriceLines.push(_kcandle.createPriceLine({price:fiyat,color:'#56a8ff',lineWidth:1,lineStyle:2,title:'fib '+ad}));
    });
  }
  // Opsiyon CW/PW/ZG (sadece BTC için anlamlı)
  if(_kcoin==='BTCUSDT'){
    const lv=await jget('/api/options/levels?currency=BTC');
    if(lv&&lv.kisa){const k=lv.kisa;
      [['call_wall','#1ff0ad','CW'],['put_wall','#ff5d6c','PW'],['zero_gamma','#ffb13c','ZG']].forEach(([key,col,t])=>{
        if(k[key])_kpriceLines.push(_kcandle.createPriceLine({price:k[key],color:col,lineWidth:1,lineStyle:t==='ZG'?2:0,title:t}));
      });
    }
  }
}
function komutaCoin(coin){_kcoin=coin;_kchart=null;_kcandle=null;document.getElementById('kchart').innerHTML='';render();}

function scrLeader(){
  const pd=ST.piyasaDurumu||{}, pv=pd.veri||{};
  const oy=ST.opsiyonYorum||{}, ov=oy.veri||{};
  const ind=ST.indicators||{}, sk=ind.skor||{};
  const skor=sk.skor!=null?sk.skor:'—', skRenk=sk.renk||'#9fb0ad';
  const detay=(sk.detay||[]).slice(0,6);

  const detayHtml=detay.length?detay.map(d=>`
    <div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:10px">
      <span style="width:90px;flex-shrink:0;color:#8a9c99;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.ind}</span>
      <div style="flex:1;height:5px;border-radius:3px;background:#141d1b;position:relative;overflow:hidden">
        <div style="position:absolute;left:50%;top:0;height:100%;width:${Math.min(Math.abs(d.katki)*2,50)}%;${d.katki>=0?'background:#1ff0ad':'background:#ff5d6c;transform:translateX(-100%)'}"></div>
      </div>
      <span style="width:34px;text-align:right;color:${d.katki>=0?'#1ff0ad':'#ff5d6c'}">${d.katki>=0?'+':''}${d.katki}</span>
    </div>`).join(''):'<div style="font-size:10px;color:#5e716f">İndikatör verisi yükleniyor...</div>';

  const durumYorum=pd.yorum||'Piyasa durumu analizi yükleniyor... (opsiyon + makro + indikatör + kitap harmanı)';
  const rejim=pv.rejim||'—';
  const regColor=rejim==='TREND'?'#1ff0ad':rejim==='RANGE'?'#ffb13c':rejim==='EXPANSION'?'#56a8ff':rejim==='REVERSAL'?'#ff5d6c':'#9fb0ad';

  return `
  <div style="display:flex;align-items:baseline;gap:13px;margin-bottom:15px">
    <h1 class="sg" style="margin:0;font-weight:600;font-size:19px;color:#eaf4f2">Komuta Merkezi</h1>
    <span style="font-size:11px;color:#5e716f">Lider Agent · piyasa durumu + canlı grafik</span>
    <button onclick="raporUret()" class="sg" style="margin-left:auto;background:#11201b;border:1px solid #1ff0ad;color:#7af0c4;border-radius:7px;padding:7px 14px;font-weight:600;font-size:11px;cursor:pointer">⚡ Rapor Üret</button>
  </div>

  <!-- PİYASA DURUMU — TAM GENİŞLİK -->
  <div class="card" style="padding:16px 18px;margin-bottom:13px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:11px">
      <span class="sg" style="font-size:10px;letter-spacing:.16em;color:#5e716f">PİYASA DURUMU</span>
      <span class="sg" style="font-weight:700;font-size:16px;color:${regColor}">${rejim}</span>
      ${pv.move_source?`<span style="font-size:10px;color:#8a9c99;border:1px solid #1a2422;padding:2px 8px;border-radius:5px">${pv.move_source}</span>`:''}
      ${pv.oar_score!=null?`<span style="font-size:10px;color:#7af0c4">OAR ${pv.oar_score}/100</span>`:''}
      ${pv.korku?`<span style="font-size:10px;color:#ffb13c;margin-left:auto">F&G ${pv.korku}</span>`:''}
    </div>
    <div style="font-size:11.5px;color:#b8c6c3;line-height:1.6;white-space:pre-wrap">${esc(durumYorum)}</div>
    ${pv.call_wall?`<div style="display:flex;gap:14px;margin-top:11px;padding-top:10px;border-top:1px solid #141d1b;font-size:10px;color:#8a9c99">
      <span>CW <b style="color:#1ff0ad">$${fmtNum(pv.call_wall)}</b></span>
      <span>PW <b style="color:#ff5d6c">$${fmtNum(pv.put_wall)}</b></span>
      <span>ZG <b style="color:#ffb13c">$${fmtNum(pv.zero_gamma)}</b></span>
      <span>İndikatör <b style="color:${skRenk}">${skor}/100 ${sk.yon||''}</b></span>
    </div>`:''}
  </div>

  <!-- GRAFİK + SKOR -->
  <div style="display:grid;grid-template-columns:1.7fr 1fr;gap:13px;margin-bottom:13px">
    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid #18211f">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="sg" style="font-weight:600;font-size:12px;color:#eaf4f2">ASIA RANGE · ${_kcoin==='BTCUSDT'?'BTC':'ETH'} 5M</span>
          <span style="font-size:9px;color:#5e716f">OAR fib · opsiyon seviyeleri</span>
        </div>
        <div style="display:flex;gap:5px">
          <button onclick="komutaCoin('BTCUSDT')" style="font-size:10px;padding:3px 9px;border-radius:5px;cursor:pointer;border:1px solid ${_kcoin==='BTCUSDT'?'#1ff0ad':'#1a2422'};background:${_kcoin==='BTCUSDT'?'#11201b':'#0a0f0f'};color:${_kcoin==='BTCUSDT'?'#7af0c4':'#8a9c99'}">BTC</button>
          <button onclick="komutaCoin('ETHUSDT')" style="font-size:10px;padding:3px 9px;border-radius:5px;cursor:pointer;border:1px solid ${_kcoin==='ETHUSDT'?'#1ff0ad':'#1a2422'};background:${_kcoin==='ETHUSDT'?'#11201b':'#0a0f0f'};color:${_kcoin==='ETHUSDT'?'#7af0c4':'#8a9c99'}">ETH</button>
        </div>
      </div>
      <div style="display:flex;gap:11px;padding:6px 15px;font-size:9px;border-bottom:1px solid #18211f">
        <span style="color:#1ff0ad">━ CW</span><span style="color:#ff5d6c">━ PW</span>
        <span style="color:#ffb13c">┄ ZG</span><span style="color:#56a8ff">┄ OAR fib</span>
      </div>
      <div id="kchart" style="height:300px;width:100%"></div>
    </div>

    <div class="card" style="padding:15px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="sg" style="font-size:9.5px;letter-spacing:.14em;color:#5e716f">5M İNDİKATÖR SKORU</span>
        <span style="font-size:9px;color:#5e716f">${ind.indikator_sayisi||0} indikatör</span>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="position:relative;width:74px;height:74px;flex-shrink:0">
          <svg width="74" height="74" viewBox="0 0 74 74">
            <circle cx="37" cy="37" r="32" fill="none" stroke="#141d1b" stroke-width="6"/>
            <circle cx="37" cy="37" r="32" fill="none" stroke="${skRenk}" stroke-width="6"
              stroke-dasharray="${Math.abs(skor==='—'?0:skor)/100*201} 201" stroke-linecap="round" transform="rotate(-90 37 37)"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <span class="sg" style="font-weight:700;font-size:18px;color:${skRenk};line-height:1">${skor}</span>
            <span style="font-size:7px;color:#5e716f">/100</span>
          </div>
        </div>
        <div style="min-width:0">
          <div class="sg" style="font-weight:700;font-size:15px;color:${skRenk}">${sk.yon||'—'}</div>
          <div style="font-size:9.5px;color:#7d908d;margin-top:4px;line-height:1.4">${ind.indikator_sayisi||0} ücretsiz indikatör, ağırlıklı</div>
        </div>
      </div>
      <div style="margin-top:13px;padding-top:11px;border-top:1px solid #141d1b">
        <div style="font-size:8.5px;letter-spacing:.1em;color:#5e716f;margin-bottom:7px">EN ETKİLİ KATKILAR</div>
        ${detayHtml}
      </div>
    </div>
  </div>

  <!-- OPSİYON GENEL DURUM — TAM GENİŞLİK -->
  <div class="card" style="padding:16px 18px;margin-bottom:13px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:11px">

function cokluTeyitHtml(){
  // Aynı sembol+yön'de 2+ bot sinyali = teyit
  const sigs=(ST.signals||[]).slice(-60);
  const grup={};
  sigs.forEach(s=>{
    if(!s.symbol||!s.direction)return;
    const key=s.symbol+'|'+(s.direction||'').toUpperCase();
    (grup[key]=grup[key]||new Set()).add(s.bot||'?');
  });
  const teyitler=Object.entries(grup).filter(([k,v])=>v.size>=2)
    .map(([k,v])=>{const[sym,yon]=k.split('|');return{sym,yon,botlar:[...v]};}).slice(0,8);
  if(!teyitler.length)return '<div style="font-size:10px;color:#5e716f">Henüz çoklu teyit yok — 2+ bot aynı yönde sinyal verince burada görünür.</div>';

    <span style="font-weight:600;color:#cdd9d8;width:90px">${t.sym}</span>

    <span style="color:#8a9c99;font-size:10px;margin-left:auto">${t.botlar.join(' + ')}</span>

}

      <div class="sg" style="padding:12px 15px;border-bottom:1px solid #18211f;font-size:9.5px;letter-spacing:.14em;color:#5e716f">SON DEPLOYLAR</div>
      ${(dep.deploys||[]).map(x=>`<div style="display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid #131918">
        <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${durRenk(x.durum)};box-shadow:0 0 7px ${durRenk(x.durum)}"></span>
        <div style="min-width:0;flex:1">
          <div style="font-size:10.5px;color:#c4d2cf;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.commit_msg||x.id)}</div>
          <div style="font-size:9px;color:#5e716f;margin-top:2px">${x.commit_id} · ${zf(x.olusturma)}</div>
        </div>
        <span style="font-size:9px;font-weight:600;color:${durRenk(x.durum)};flex-shrink:0">${x.durum}</span>
      </div>`).join('')}
    </div>`;
  }

  let ghHtml;
  if(!gh.bagli){ghHtml=baglantiUyari(gh,'GitHub API');}
  else{
    ghHtml=`<div class="card" style="overflow:hidden">
      <div class="sg" style="padding:12px 15px;border-bottom:1px solid #18211f;font-size:9.5px;letter-spacing:.14em;color:#5e716f">SON COMMIT'LER</div>
      ${(gh.commits||[]).map(x=>`<div style="display:flex;align-items:flex-start;gap:11px;padding:10px 15px;border-bottom:1px solid #131918">
        <span style="font-size:9px;color:#56a8ff;font-weight:600;flex-shrink:0;margin-top:2px">${x.sha}</span>
        <div style="min-width:0;flex:1">
          <div style="font-size:10.5px;color:#c4d2cf;line-height:1.4">${esc(x.mesaj)}</div>
          <div style="font-size:9px;color:#5e716f;margin-top:2px">${esc(x.yazar)} · ${zf(x.tarih)}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  let envHtml;
  if(!env.bagli){envHtml='';}
  else{
    envHtml=`<div class="card" style="padding:15px;margin-top:13px">
      <div class="sg" style="font-size:9.5px;letter-spacing:.14em;color:#5e716f;margin-bottom:12px">ENVIRONMENT DEĞİŞKENLERİ <span style="color:#5e716f">(değerler gizli)</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${(env.degiskenler||[]).map(e=>`<span style="display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#9fb0ad;background:#0a0f0f;border:1px solid #1a2422;padding:5px 10px;border-radius:5px">
          <span style="width:5px;height:5px;border-radius:50%;background:${e.dolu?'#1ff0ad':'#5e716f'}"></span>${esc(e.key)}</span>`).join('')}
      </div>
    </div>`;
  }

  return `
  <div style="display:flex;align-items:baseline;gap:13px;margin-bottom:15px">
    <h1 class="sg" style="margin:0;font-weight:600;font-size:19px;color:#eaf4f2">Sistem / DevOps</h1>
    <span style="font-size:11px;color:#5e716f">Render deploylar · GitHub commit'ler · environment</span>
    <button onclick="loadDevops(true)" class="sg" style="margin-left:auto;background:#0a0f0f;border:1px solid #1a2422;color:#9fb0ad;border-radius:7px;padding:7px 12px;font-size:11px;cursor:pointer">🔄 Yenile</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
    ${depHtml}
    ${ghHtml}
  </div>
  ${envHtml}`;
}

// ════════════ ACTIONS ════════════
function selTheory(id){ST.selTheory=ST.theories.find(t=>t.id===id);render();}
async function advBacktest(){
  const sym=$('adv-sym').value, gun=$('adv-gun').value, fib=$('adv-fib').value;
  const ab=$('adv-as').value, abit=$('adv-ab').value;
  ST.advTest={_yukleniyor:true};
  // basit yükleniyor göstergesi
  const m=$('screen');const btn=document.querySelector('[onclick="advBacktest()"]');
  if(btn){btn.textContent='⏳ ...';btn.disabled=true;}
  const d=await jpost('/api/theory/advanced',{sembol:sym,gun:parseInt(gun),fib:parseFloat(fib),asia_baslangic:parseInt(ab),asia_bitis:parseInt(abit)});
  ST.advTest=d||{hata:'bağlantı hatası'};
  if(ST.tab==='theory')render();
}
async function teoriTest(id){
  const el=$('teori-durum');if(el)el.textContent='⏳ '+id+' test ediliyor (1-2 dk)...';
  const d=await jpost('/api/teori/test',{teori_id:id,sembol:'BTCUSDT',gun:365});
  await loadTheories();
  if(d&&!d.hata){ST.selTheory=ST.theories.find(t=>t.id===id);render();}
  else if(el)el.textContent=(d&&d.hata)||'Hata';
}
async function raporUret(){
  const m=$('screen');const h1=m.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend','<span id="rprog" style="font-size:11px;color:#ffb13c;margin-left:10px">⏳ üretiliyor...</span>');
  await jpost('/api/leader/report',{});
  await loadReport();render();
}
async function ask(q){$('chatin')&&($('chatin').value=q);send();}
function chatHtmlGen(){
  return (ST.chat||[]).map(m=>{const u=m.role==='user';
    return `<div style="display:flex;${u?'justify-content:flex-end':'justify-content:flex-start'}">
      <div style="max-width:90%;border-radius:10px;padding:11px 13px;${u?'background:#11201b;border:1px solid #1c3a2e':'background:#0a0f0f;border:1px solid #18211f'}">
        <div style="font-size:11.5px;line-height:1.5;color:${u?'#cfeede':'#c4d2cf'};white-space:pre-wrap">${esc(m.txt)}</div>
      </div></div>`;}).join('')||'<div style="font-size:10px;color:#5e716f;text-align:center;padding:20px">Lider Agenta tüm sistem + kitap bağlamıyla soru sorun.</div>';
}
function updateChatOnly(){
  const cb=$('chatbox');
  if(cb){cb.innerHTML=chatHtmlGen();cb.scrollTop=cb.scrollHeight;}
}
async function send(){
  const inp=$('chatin');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';
  ST.chat.push({role:'user',txt:q});
  ST.chat.push({role:'agent',txt:'⏳ Analiz ediliyor...'});
  updateChatOnly();  // tüm ekranı değil, sadece sohbeti güncelle
  const d=await jpost('/api/leader/chat',{soru:q});
  ST.chat.pop();  // typing mesajını çıkar
  ST.chat.push({role:'agent',txt:(d&&d.cevap)||'Yanıt alınamadı'});
  updateChatOnly();
}

let _lchart,_lcandle,_locvd,_locvdLine,_lpriceLines=[];
async function renderLeaderChart(){
  const el=document.getElementById('lchart');
  if(!el||typeof LightweightCharts==='undefined')return;
  // grafik bir kez kur
  if(!_lchart){
    _lchart=LightweightCharts.createChart(el,{
      layout:{background:{color:'#0c1112'},textColor:'#5e716f'},
      grid:{vertLines:{color:'#141d1b'},horzLines:{color:'#141d1b'}},
      timeScale:{borderColor:'#18211f',timeVisible:true},
      rightPriceScale:{borderColor:'#18211f'},
      width:el.clientWidth,height:230});
    _lcandle=_lchart.addCandlestickSeries({upColor:'#1ff0ad',downColor:'#ff5d6c',
      borderUpColor:'#1ff0ad',borderDownColor:'#ff5d6c',wickUpColor:'#1ff0ad',wickDownColor:'#ff5d6c'});
    const ocel=document.getElementById('ocvdchart');
    _locvd=LightweightCharts.createChart(ocel,{
      layout:{background:{color:'#0c1112'},textColor:'#5e716f'},
      grid:{vertLines:{color:'#141d1b'},horzLines:{color:'#141d1b'}},
      timeScale:{visible:false},rightPriceScale:{borderColor:'#18211f'},
      width:ocel.clientWidth,height:80});
    _locvdLine=_locvd.addLineSeries({color:'#8b5cf6',lineWidth:2});
    new ResizeObserver(()=>{if(_lchart)_lchart.applyOptions({width:el.clientWidth});if(_locvd)_locvd.applyOptions({width:document.getElementById('ocvdchart').clientWidth});}).observe(el);
  }
  // mum verisi
  const oh=await jget('/api/ohlcv?symbol=BTCUSDT&interval=5m&limit=200');
  if(oh&&oh.candles){
    _lcandle.setData(oh.candles.map(c=>({time:Math.floor(c.ts/1000),open:c.open,high:c.high,low:c.low,close:c.close})));
  }
  // opsiyon seviyeleri (0-7g) + OAR fib çizgileri
  _lpriceLines.forEach(l=>_lcandle.removePriceLine(l));_lpriceLines=[];
  const lv=await jget('/api/options/levels?currency=BTC');
  if(lv&&lv.kisa){
    const k=lv.kisa;
    [['call_wall','#1ff0ad','CW'],['put_wall','#ff5d6c','PW'],['zero_gamma','#ffb13c','ZG']].forEach(([key,col,t])=>{
      if(k[key])_lpriceLines.push(_lcandle.createPriceLine({price:k[key],color:col,lineWidth:1,lineStyle:t==='ZG'?2:0,title:t}));
    });
  }
  // OAR fib (Asia range TR 03-07 → fib 0.377/0.618)
  const fib=await jget('/api/oar-fib?symbol=BTCUSDT');
  if(fib&&fib.seviyeler){
    Object.entries(fib.seviyeler).forEach(([ad,fiyat])=>{
      _lpriceLines.push(_lcandle.createPriceLine({price:fiyat,color:'#56a8ff',lineWidth:1,lineStyle:2,title:'fib '+ad}));
    });
  }
  // opsiyon CVD
  const ocvd=await jget('/api/options/cvd?currency=BTC');
  if(ocvd&&ocvd.data){
    _locvdLine.setData(ocvd.data.map((p,i)=>({time:Math.floor(p.ts/1000),value:p.cvd})));
    const yel=document.getElementById('ocvd-yon');
    if(yel)yel.innerHTML=`${ocvd.yon==='YUKARI'?'<span style="color:#1ff0ad">▲ YUKARI</span>':'<span style="color:#ff5d6c">▼ AŞAĞI</span>'} · güncel ${ocvd.guncel}`;
  }
}

    const renk={lider:'#1ff0ad',backtest:'#ffb13c',research:'#56a8ff'};

    ST.feed=d.raporlar.slice().reverse().map(r=>({

    }));

}

// ════════════ INIT ════════════
async function boot(){
  renderNav();renderRail();render();
  tickClock();setInterval(tickClock,1000);
  await Promise.all([loadSignals(),loadReport(),loadContext(),loadTheories(),loadFeed(),loadKnowledge(),loadIndicators(),loadOptScore(),loadPiyasaDurumu(),loadOpsiyonYorum(),loadBasariSkoru()]);
  renderRail();render();
  loadTicker();loadOptions();
  setInterval(async()=>{await loadSignals();await loadContext();await loadIndicators();await loadOptScore();
    if(ST.tab==='live'){updateFeedOnly();}
    else if(['leader','agents'].includes(ST.tab))render();},120000);
  setInterval(async()=>{await loadReport();await loadFeed();await loadPiyasaDurumu();await loadOpsiyonYorum();
    if(ST.tab==='live'){updateFeedOnly();}
    else if(ST.tab==='leader')render();},300000);
  setInterval(loadTicker,60000);
}
boot();
